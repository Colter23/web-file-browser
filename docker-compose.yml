services:
  web-file-browser:
    build:
      context: .
      args:
        WFB_UID: ${WEB_FILE_BROWSER_UID:-1000}
        WFB_GID: ${WEB_FILE_BROWSER_GID:-1000}
    image: web-file-browser:local
    restart: unless-stopped
    user: "${WEB_FILE_BROWSER_UID:-1000}:${WEB_FILE_BROWSER_GID:-1000}"
    ports:
      - "${WEB_FILE_BROWSER_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      WEB_FILE_BROWSER_BIND: "0.0.0.0"
      WEB_FILE_BROWSER_STATIC_DIR: "/app/ui/dist"
      WEB_FILE_BROWSER_CONFIG_FILE: "/app/data/config.json"
      WEB_FILE_BROWSER_AUTH_FILE: "/app/data/auth.json"
      WEB_FILE_BROWSER_MAPPING_FILE: "/app/data/mappings.json"
      WEB_FILE_BROWSER_TRASH_DIR: "/app/data/trash"
      WEB_FILE_BROWSER_AUDIT_FILE: "/app/data/audit.jsonl"
    volumes:
      # data 保存 JSON 配置、认证哈希、回收站和审计日志，升级镜像时必须保留。
      - ./data:/app/data
      # 在应用内新增挂载时，folderPath 可以填写 /mnt/files。
      - ./files:/mnt/files
      # 只读目录示例：
      # - /srv/media:/mnt/media:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      # 应用不需要额外 Linux capability，文件权限只由 UID/GID 和挂载目录权限决定。
      - ALL
