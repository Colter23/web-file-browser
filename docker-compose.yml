services:
  web-file-browser:
    build:
      context: .
      args:
        WFB_UID: ${WEB_FILE_BROWSER_UID:-1000}
        WFB_GID: ${WEB_FILE_BROWSER_GID:-1000}
    image: web-file-browser:local
    restart: unless-stopped
    user: "${WEB_FILE_BROWSER_UID:-1000}:${WEB_FILE_BROWSER_GID:-1000}"
    ports:
      - "${WEB_FILE_BROWSER_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      WEB_FILE_BROWSER_BIND: "0.0.0.0"
      WEB_FILE_BROWSER_ADMIN_PASSWORD: "${WEB_FILE_BROWSER_ADMIN_PASSWORD:-}"
      WEB_FILE_BROWSER_CORS_ORIGINS: "${WEB_FILE_BROWSER_CORS_ORIGINS:-}"
      WEB_FILE_BROWSER_TRUST_PROXY_HEADERS: "${WEB_FILE_BROWSER_TRUST_PROXY_HEADERS:-false}"
      WEB_FILE_BROWSER_CONFLICT_POLICY: "${WEB_FILE_BROWSER_CONFLICT_POLICY:-autoRename}"
      WEB_FILE_BROWSER_MAX_UPLOAD_BYTES: "${WEB_FILE_BROWSER_MAX_UPLOAD_BYTES:-}"
      WEB_FILE_BROWSER_MAX_EDIT_BYTES: "${WEB_FILE_BROWSER_MAX_EDIT_BYTES:-2097152}"
      WEB_FILE_BROWSER_EDITABLE_EXTENSIONS: "${WEB_FILE_BROWSER_EDITABLE_EXTENSIONS:-}"
      WEB_FILE_BROWSER_EDITABLE_MIME_TYPES: "${WEB_FILE_BROWSER_EDITABLE_MIME_TYPES:-}"
      WEB_FILE_BROWSER_MAX_DIR_PAGE_SIZE: "${WEB_FILE_BROWSER_MAX_DIR_PAGE_SIZE:-2000}"
      WEB_FILE_BROWSER_AUDIT_MAX_BYTES: "${WEB_FILE_BROWSER_AUDIT_MAX_BYTES:-10485760}"
      WEB_FILE_BROWSER_AUDIT_RETENTION_FILES: "${WEB_FILE_BROWSER_AUDIT_RETENTION_FILES:-8}"
      WEB_FILE_BROWSER_MAX_EXTRACT_BYTES: "${WEB_FILE_BROWSER_MAX_EXTRACT_BYTES:-}"
      WEB_FILE_BROWSER_MAX_EXTRACT_FILES: "${WEB_FILE_BROWSER_MAX_EXTRACT_FILES:-}"
      WEB_FILE_BROWSER_MAX_EXTRACT_DEPTH: "${WEB_FILE_BROWSER_MAX_EXTRACT_DEPTH:-64}"
      WEB_FILE_BROWSER_INDEX_ENABLED: "${WEB_FILE_BROWSER_INDEX_ENABLED:-false}"
      WEB_FILE_BROWSER_INDEX_REBUILD_ON_STARTUP: "${WEB_FILE_BROWSER_INDEX_REBUILD_ON_STARTUP:-false}"
    volumes:
      # data 保存 JSON 配置、认证哈希、回收站和审计日志，升级镜像时必须保留。
      - ./data:/app/data
      # 在应用内新增挂载时，folderPath 可以填写 /mnt/files。
      - ./files:/mnt/files
      # 只读目录示例：
      # - /srv/media:/mnt/media:ro
    security_opt:
      - no-new-privileges:true
